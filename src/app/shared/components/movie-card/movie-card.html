<div class="movie-card" (click)="goToDetails()">
  <img appSmartImage [src]="getImageUrl()" [alt]="getTitle()" class="card-image" />
  <div class="card-overlay">
    <div class="card-info">
      <h4 class="card-title">{{ getTitle() }}</h4>
      <div class="card-actions">
        <button class="watchlist-btn" appPreventDoubleClick [appPreventDoubleClick]="500" (click)="toggleWatchlist($event)">
          {{ isInWatchlist() ? '✓' : '+' }}
        </button>
      </div>
    </div>
  </div>
</div>
